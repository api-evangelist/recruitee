aid: recruitee
name: Recruitee
description: >-
  Recruitee (part of Tellent) is a collaborative applicant tracking system
  (ATS) and recruiting platform that helps growing companies build hiring
  pipelines, publish careers sites, manage candidates, schedule interviews,
  and collaborate on hiring decisions. Its REST API at https://api.recruitee.com
  exposes endpoints for candidates, offers, placements, departments, tags,
  evaluations, interviews, mailboxes, and reports, scoped to a company by
  the path segment /c/{company_id}. Authentication uses a Bearer personal
  API token generated from Settings, Apps and plugins, Personal API tokens,
  with permissions inherited from the creator's Hiring role.
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
  - Recruiting
  - ATS
  - Applicant Tracking
  - HR
  - Hiring
  - Careers Site
  - Tellent
url: >-
  https://raw.githubusercontent.com/api-evangelist/recruitee/refs/heads/main/apis.yml
created: '2026-05-11'
modified: '2026-05-11'
specificationVersion: '0.19'
apis:
  - aid: recruitee:company-api
    name: Recruitee Company (ATS) API
    description: >-
      REST API for admin-side ATS operations including candidates, offers
      (job openings), placements, departments, requisitions, tags,
      evaluations, scheduled interviews, mailbox messages, and reports.
      All endpoints are scoped to a company via /c/{company_id} and require
      a Bearer personal API token in the Authorization header.
    humanURL: https://docs.recruitee.com/reference/getting-started
    baseURL: https://api.recruitee.com/c/{company_id}
    tags:
      - ATS
      - Recruiting
      - REST API
      - Bearer Token
    properties:
      - type: Documentation
        url: https://docs.recruitee.com/reference/getting-started
      - type: Authentication
        url: https://support.recruitee.com/en/articles/1066282-api-documentation
      - type: FAQ
        url: https://support.recruitee.com/en/articles/8213076-faq-api
  - aid: recruitee:careers-site-api
    name: Recruitee Careers Site API
    description: >-
      Public, read-only API used by careers sites and embedded job widgets
      to fetch published offers, departments, and locations for unauthenticated
      job seekers. Backs the careers.recruitee.com hosted pages and
      embeddable widgets.
    humanURL: https://docs.recruitee.com/reference/quickstart
    baseURL: https://{company}.recruitee.com/api
    tags:
      - Careers Site
      - Public API
      - Job Listings
    properties:
      - type: Documentation
        url: https://docs.recruitee.com/reference/quickstart
  - aid: recruitee:webhooks
    name: Recruitee Webhooks
    description: >-
      Subscribe to ATS events such as candidate created, candidate stage
      changed, offer published, evaluation created, and interview scheduled
      to drive event-driven integrations and HRIS synchronization.
    humanURL: https://docs.recruitee.com/reference/quickstart
    baseURL: https://api.recruitee.com/c/{company_id}/webhook_endpoints
    tags:
      - Webhooks
      - Events
      - Integrations
    properties:
      - type: Documentation
        url: https://docs.recruitee.com/reference/quickstart

