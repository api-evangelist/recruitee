features:
  - name: Applicant Tracking
    description: >-
      Kanban-style candidate pipelines per job opening with stages, tags,
      sources, automated workflows, and collaboration notes.
  - name: Careers Site Builder
    description: >-
      Drag-and-drop hosted careers site builder with custom branding, SEO,
      and embeddable widgets for jobs on your own site.
  - name: Sourcing Extension
    description: >-
      Chrome extension and source-tracking tools for adding candidates from
      LinkedIn and other platforms directly into the ATS.
  - name: Interview Scheduling
    description: >-
      Native interview scheduling with calendar integrations, automated
      reminders, and structured evaluation scorecards.
  - name: Reports and Analytics
    description: >-
      Hiring funnel reports, time-to-hire, source effectiveness, EEO/OFCCP
      reporting, and customizable dashboards via the Reports API.
  - name: Webhooks and Integrations
    description: >-
      Event webhooks and an integration marketplace covering background
      checks, assessments, video interviews, HRIS, and job boards.
solutions:
  - name: Mid-Market Hiring
    description: >-
      End-to-end ATS for scaling teams hiring across multiple departments,
      offices, and countries with role-based permissions.
  - name: Multi-Location Recruitment
    description: >-
      Manage hiring pipelines across locations, languages, and currencies
      from one centralized platform.
  - name: HRIS Synchronization
    description: >-
      Sync hired candidates and new starters from Recruitee into HRIS,
      payroll, and onboarding systems via the API or webhooks.
useCases:
  - name: ATS to HRIS Sync
    description: >-
      Push hired candidates from Recruitee into BambooHR, Personio, HiBob,
      Workday, or other HRIS platforms automatically.
  - name: Job Board Distribution
    description: >-
      Programmatically publish Recruitee offers to LinkedIn, Indeed, and
      niche job boards via the careers site API.
  - name: Custom Analytics
    description: >-
      Export candidate, offer, and pipeline data into a data warehouse for
      custom hiring analytics and DEI reporting.
integrations:
  - name: LinkedIn Recruiter
    description: Source candidates and post jobs to LinkedIn from Recruitee
  - name: Indeed
    description: Automatic job posting and apply-with-Indeed flow
  - name: Slack
    description: Real-time hiring notifications and feedback in Slack channels
  - name: Google Calendar
    description: Two-way calendar sync for interviews and scheduling
  - name: BambooHR
    description: Sync hired candidates into BambooHR as new employees
  - name: HiBob
    description: Send hired candidates from Recruitee to HiBob for onboarding
